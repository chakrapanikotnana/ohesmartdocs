{% extends "base.html" %}

{% block title %}
Data Entry
{% endblock %}

{% block extra_css %}
<style>
    .form-container {
        max-height: 80vh;
        overflow-y: auto;
    }
</style>
{% endblock %}

{% block content %}

<div class="d-flex justify-content-between mb-4">
    <h2 style="color: white;">Data Entry Form</h2>

    <!-- <div>
        <a href="/export-excel" class="btn btn-success">
            Export Excel
        </a>
    </div> -->
</div>

{% if success %}
<div class="alert alert-success">
    Data saved successfully
</div>
{% endif %}

{% if message %}
<div class="alert alert-info">
    {{ message }}
</div>
{% endif %}

<!-- {% if show_downloaded_button %}
<div class="mt-3">
    <a href="/downloaded-records" class="btn btn-warning">
        View Downloaded Records ({{ downloaded_count }})
    </a>
</div>
{% endif %} -->

<div class="p-4 bg-white rounded shadow">
    <form method="post" action="/save-data">

        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-4 g-3">

            {% for field in fields %}
            <div class="col">
                <div class="sap-form-grid">
                    <label class="sap-label">
                        {{ field }}
                    </label>
                    <input type="text" class="form-control form-control-sm sap-input" name="{{ field }}">
                </div>
            </div>
            {% endfor %}

        </div>

        <div class="d-flex justify-content-center mt-3">
            <button type="submit" class="btn btn-primary">
                Save Data
            </button>
        </div>

    </form>
</div>

{% endblock %}
