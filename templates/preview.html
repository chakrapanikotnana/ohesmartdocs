<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Preview</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <nav class="navbar navbar-dark app-navbar">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Image Validation Preview</span>
            <a class="btn btn-outline-light btn-sm" href="/upload">Back</a>
        </div>
    </nav>

    <main class="container-fluid px-3 py-4 py-md-5">
        <div class="row justify-content-center">
            <div class="col-12 col-xl-9">
                <section class="card app-card shadow-lg">
                    <div class="card-body p-3 p-md-4">
                        <h1 class="h3 text-center mb-4">Validation Results</h1>

                        <div class="table-responsive">
                            <table class="table table-striped table-hover align-middle text-center mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th scope="col">Row</th>
                                        <th scope="col">Drawing</th>
                                        <th scope="col">Status</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {% for r in results %}
                                    <tr>
                                        <td>{{ r.row }}</td>
                                        <td>{{ r.drawing }}</td>
                                        <td>
                                            {% if r.found %}
                                            <span class="badge text-bg-success">Found</span>
                                            {% else %}
                                            <span class="badge text-bg-danger">Missing</span>
                                            {% endif %}
                                        </td>
                                    </tr>
                                    {% endfor %}
                                </tbody>
                            </table>
                        </div>

                        {% if not has_missing %}
                        <form action="/generate" method="post" class="mt-4">
                            <button class="btn btn-primary btn-lg w-100" type="submit">Generate PDFs</button>
                        </form>
                        {% else %}
                        <div class="alert alert-danger mt-4 mb-0" role="alert">Fix missing images before proceeding.</div>
                        {% endif %}
                    </div>
                </section>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
