<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>
        {% block title %}
        OHE SmartDocs
        {% endblock %}
    </title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->

    <link rel="stylesheet" href="/static/css/style.css">

    {% block extra_css %}
    {% endblock %}

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark app-navbar">

        <div class="container-fluid">

            <a class="navbar-brand fw-bold" href="#">

                OHE SmartDocs

            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="navbarContent">

                <!-- Left Navigation -->

                <ul class="navbar-nav ms-4">

                    <li class="nav-item">

                        <a class="nav-link
                    {% if active_page == 'upload' %}
                    active
                    {% endif %}" href="/upload">

                            Generate PDFs

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link
                    {% if active_page == 'data-entry' %}
                    active
                    {% endif %}" href="/data-entry">

                            Data Entry

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link
                    {% if active_page == 'downloaded-records' %}
                    active
                    {% endif %}" href="/downloaded-records">

                            Download Excel

                        </a>

                    </li>

                </ul>

                <!-- Right Profile -->

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item dropdown">

                        <a class="nav-link dropdown-toggle profile-dropdown" href="#" role="button"
                            data-bs-toggle="dropdown">

                            <img src="/static/images/profile.png" class="profile-image" alt="Profile">

                            <div class="profile-info">

                                <div class="profile-name">
                                    {{ display_name }}
                                </div>

                                <div class="profile-role">
                                    Project User
                                </div>

                            </div>

                        </a>

                        <ul class="dropdown-menu dropdown-menu-end shadow profile-menu">

                            <li class="dropdown-header">

                                <div class="d-flex align-items-center gap-3">

                                    <img src="/static/images/profile.png" class="profile-image-lg" alt="Profile">

                                    <div>

                                        <div class="fw-bold">
                                            {{ display_name }}
                                        </div>

                                        <div class="small text-muted">
                                            {{ user }}
                                        </div>

                                    </div>

                                </div>

                            </li>

                            <li>
                                <hr class="dropdown-divider">
                            </li>

                            <li>

                                <a class="dropdown-item" href="#">

                                    My Profile

                                </a>

                            </li>

                            <li>

                                <a class="dropdown-item text-danger fw-semibold" href="/logout">

                                    Logout

                                </a>

                            </li>

                        </ul>

                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- Main Content -->

    <div class="container mt-4">

        {% block content %}
        {% endblock %}

    </div>

    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    {% block extra_js %}
    {% endblock %}

</body>

</html>
