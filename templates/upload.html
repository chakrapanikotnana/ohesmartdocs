<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Upload Excel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <nav class="navbar navbar-dark app-navbar">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">OHE SmartDocs</span>
            <a class="btn btn-outline-light btn-sm" href="/logout">Logout</a>
        </div>
    </nav>

    <main class="container-fluid px-3 py-4 py-md-5">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-10 col-xl-9">
                <section class="card app-card shadow-lg">
                    <div class="card-body p-4 p-md-5">
                        <h1 class="h3 text-center mb-3">Generate PDFs</h1>

                        {% if display_name %}
                        <div class="alert alert-success" role="status">Logged in as {{ display_name }}</div>
                        {% endif %}

                        {% if errors %}
                        <div class="alert alert-danger" role="alert">
                            <ul class="mb-0 ps-3">
                                {% for error in errors %}
                                <li>{{ error }}</li>
                                {% endfor %}
                            </ul>
                        </div>
                        {% endif %}

                        <form action="/upload" method="post" enctype="multipart/form-data" class="d-grid gap-3"
                            target="download-frame" id="upload-form">
                            <div>

                                <div class="row g-3">
                                    {% for field in header_fields %}
                                    <div
                                        class="{% if field.name == 'header_title' or field.name == 'company_line_1' %}col-12{% else %}col-12 col-md-6 col-xl-4{% endif %}">
                                        <label for="{{ field.name }}" class="form-label">{{ field.label }}</label>
                                        <input id="{{ field.name }}" class="form-control" type="text"
                                            name="{{ field.name }}" value="{{ field.value }}">
                                    </div>
                                    {% endfor %}
                                </div>
                            </div>

                            <div>
                                <label for="excel-file" class="form-label">Upload Excel File</label>
                                <input id="excel-file" class="form-control" type="file" name="file" required>
                            </div>
                            <button class="btn btn-primary btn-lg w-100" type="submit">Validate & Download</button>
                        </form>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <div id="loading-overlay" class="loading-overlay d-none">
        <div class="text-center">
            <div class="spinner-border text-light" role="status"></div>
            <div class="loading-text mt-3">
                Generating PDFs, please wait...
            </div>
        </div>
    </div>
    <iframe id="download-frame" name="download-frame" style="display:none;"></iframe>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {

            const form = document.getElementById("upload-form");
            const overlay = document.getElementById("loading-overlay");
            const submitButton = form.querySelector("button[type='submit']");

            form.addEventListener("submit", function () {

                overlay.classList.remove("d-none");

                submitButton.disabled = true;
                submitButton.innerText = "Generating PDFs...";

                // Hide loader after expected server processing time
                setTimeout(() => {
                    overlay.classList.add("d-none");
                    submitButton.disabled = false;
                    submitButton.innerText = "Validate & Download";
                }, 4000);

            });

        });
    </script>
</body>

</html>
