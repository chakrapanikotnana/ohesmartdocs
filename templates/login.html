<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OHE SmartDocs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-dark app-navbar">
        <div class="container-fluid justify-content-center">
            <span class="navbar-brand mb-0 h1">Voltrio Solutions</span>
        </div>
    </nav>

    <main class="container-fluid px-3 py-4 py-md-5">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4">
                <section class="card app-card shadow-lg">
                    <div class="card-body p-4 p-md-5">
                        <h1 class="h3 text-center mb-4">OHE SmartDocs</h1>

                        {% if error %}
                        <div class="alert alert-danger" role="alert">{{ error }}</div>
                        {% endif %}

                        <form method="post" action="/login" class="d-grid gap-3">
                            <div>
                                <label for="username" class="form-label">Username</label>
                                <input id="username" class="form-control" type="text" name="username"
                                    placeholder="Username" required>
                            </div>
                            <div>
                                <label for="password" class="form-label">Password</label>
                                <input id="password" class="form-control" type="password" name="password"
                                    placeholder="Password" required>
                            </div>
                            <button class="btn btn-primary btn-lg w-100" type="submit">Login</button>
                        </form>

                        <div class="demo-logins mt-4">
                            <strong>Demo logins</strong>
                            <span>demo1 / demo1</span>
                            <span>demo2 / demo2</span>
                            <span>demo3 / demo3</span>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
